<svg
  [attr.width]="svgWidth"
  [attr.height]="svgHeight"
  [attr.viewBox]="'0 0 ' + svgWidth + ' ' + svgHeight"
  class="tango-board"
>
  <defs>
    <!-- Conflict pattern -->
    <pattern id="tangoConflict" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#DC2626" stroke-width="2" stroke-opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Cell backgrounds -->
  @for (i of cells; track i) {
    <rect
      [attr.x]="cellX(i)"
      [attr.y]="cellY(i)"
      [attr.width]="cellSize"
      [attr.height]="cellSize"
      [attr.fill]="isPrefilled(i) ? '#FFF7ED' : '#FFFFFF'"
    />
  }

  <!-- Grid lines -->
  @for (line of horizontalGridLines; track line.y) {
    <line [attr.x1]="0" [attr.y1]="line.y" [attr.x2]="svgWidth" [attr.y2]="line.y" stroke="#e0e0e0" stroke-width="1"/>
  }
  @for (line of verticalGridLines; track line.x) {
    <line [attr.x1]="line.x" [attr.y1]="0" [attr.x2]="line.x" [attr.y2]="svgHeight" stroke="#e0e0e0" stroke-width="1"/>
  }

  <!-- Board border -->
  <rect x="0.5" y="0.5" [attr.width]="svgWidth - 1" [attr.height]="svgHeight - 1" fill="none" stroke="#1a1a1a" stroke-width="2" rx="2"/>

  <!-- Conflict overlays -->
  @for (i of cells; track i) {
    @if (isConflict(i)) {
      <rect
        [attr.x]="cellX(i)"
        [attr.y]="cellY(i)"
        [attr.width]="cellSize"
        [attr.height]="cellSize"
        fill="url(#tangoConflict)"
      />
    }
  }

  <!-- Hint highlights -->
  @for (i of cells; track i) {
    @if (isHintCell(i)) {
      <rect
        [attr.x]="cellX(i) + 3"
        [attr.y]="cellY(i) + 3"
        [attr.width]="cellSize - 6"
        [attr.height]="cellSize - 6"
        fill="#FDE68A"
        fill-opacity="0.45"
        rx="6"
      />
    }
  }

  <!-- Hiding symbols (animated out) -->
  @for (item of hidingSymbols; track item.key) {
    <g class="symbol-hide"
       [attr.transform-origin]="item.x + ' ' + item.y">
      <image [attr.href]="item.type === 'sun' ? 'icons/game/sun.svg' : 'icons/game/moon.svg'"
             [attr.x]="item.x - symbolRadius"
             [attr.y]="item.y - symbolRadius"
             [attr.width]="symbolRadius * 2" [attr.height]="symbolRadius * 2"/>
    </g>
  }

  <!-- Sun symbols -->
  @for (i of cells; track i) {
    @if (isSun(i)) {
      <g [class.symbol-show]="!isPrefilled(i)"
         [class.symbol-win]="game.gameWon()"
         [style.animation-delay]="game.gameWon() ? (winAnimDelay(i) + 'ms') : '0ms'"
         [attr.transform-origin]="cellCenterX(i) + ' ' + cellCenterY(i)">
        <image href="icons/game/sun.svg"
               [attr.x]="cellCenterX(i) - symbolRadius"
               [attr.y]="cellCenterY(i) - symbolRadius"
               [attr.width]="symbolRadius * 2" [attr.height]="symbolRadius * 2"
               [attr.opacity]="isPrefilled(i) ? 0.65 : 1"/>
      </g>
    }
  }

  <!-- Moon symbols -->
  @for (i of cells; track i) {
    @if (isMoon(i)) {
      <g [class.symbol-show]="!isPrefilled(i)"
         [class.symbol-win]="game.gameWon()"
         [style.animation-delay]="game.gameWon() ? (winAnimDelay(i) + 'ms') : '0ms'"
         [attr.transform-origin]="cellCenterX(i) + ' ' + cellCenterY(i)">
        <image href="icons/game/moon.svg"
               [attr.x]="cellCenterX(i) - symbolRadius"
               [attr.y]="cellCenterY(i) - symbolRadius"
               [attr.width]="symbolRadius * 2" [attr.height]="symbolRadius * 2"
               [attr.opacity]="isPrefilled(i) ? 0.65 : 1"/>
      </g>
    }
  }

  <!-- Win flash overlay — separate transparent rects that animate green then fade -->
  @if (game.gameWon()) {
    @for (i of cells; track i) {
      <rect
        [attr.x]="cellX(i)"
        [attr.y]="cellY(i)"
        [attr.width]="cellSize"
        [attr.height]="cellSize"
        fill="#ECFDF5"
        fill-opacity="0"
        class="cell-win-overlay"
        [style.animation-delay]="winAnimDelay(i) + 'ms'"
      />
    }
  }

  <!-- Constraint indicators (= or ×) on cell borders -->
  @for (ct of constraintDisplays; track $index) {
    <image [attr.href]="ct.symbol === '=' ? 'icons/game/constraint-equals.svg' : 'icons/game/constraint-x.svg'"
           [attr.x]="ct.x - 10"
           [attr.y]="ct.y - 10"
           width="20" height="20"
           style="pointer-events: none;"/>
  }

  <!-- Click interaction layer -->
  @for (i of cells; track i) {
    <rect
      [attr.x]="cellX(i)"
      [attr.y]="cellY(i)"
      [attr.width]="cellSize"
      [attr.height]="cellSize"
      fill="transparent"
      [style.cursor]="isPrefilled(i) ? 'default' : 'pointer'"
      (click)="onCellClick(i)"
    />
  }
</svg>
