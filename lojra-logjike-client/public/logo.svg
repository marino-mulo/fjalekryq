<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 350" width="260" height="420" fill="none">

  <defs>
    <linearGradient id="screen" x1="70" y1="70" x2="190" y2="300">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>

    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <style>
      .phoneFloat{
        animation: floatPhone 3s ease-in-out infinite;
        transform-origin:130px 200px;
      }

      @keyframes floatPhone{
        0%{transform:rotate(12deg) translateY(0)}
        50%{transform:rotate(12deg) translateY(-8px)}
        100%{transform:rotate(12deg) translateY(0)}
      }
    </style>

  </defs>

  <g class="phoneFloat" transform="rotate(12 130 200)">

    <!-- phone -->
    <rect x="55" y="40" width="150" height="260" rx="22"
          fill="#D1FAE5" stroke="#059669" stroke-width="2"/>

    <!-- screen -->
    <rect x="68" y="58" width="124" height="210" rx="16" fill="url(#screen)"/>

    <!-- purple puzzle top right -->
    <g transform="translate(150 90) scale(0.36)">
      <rect x="5" y="5" width="17" height="17" rx="4" fill="#C084FC" opacity="0.7"/>
      <rect x="24" y="5" width="16" height="17" rx="4" fill="#C084FC" opacity="0.7"/>
      <rect x="24" y="24" width="16" height="16" rx="4" fill="#C084FC" opacity="0.7"/>
      <rect x="42" y="24" width="17" height="16" rx="4" fill="#C084FC" opacity="0.7"/>
      <rect x="42" y="42" width="17" height="17" rx="4" fill="#C084FC" opacity="0.7"/>

      <path d="M14,14 L32,14 L32,32 L50,32 L50,50"
            fill="none"
            stroke="#7C3AED"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-dasharray="150"
            stroke-dashoffset="150">
      
      </path>

      <circle cx="13.5" cy="13.5" r="4" fill="#7C3AED" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="50.5" cy="50.5" r="4" fill="#A855F7" stroke="#1a1a1a" stroke-width="1.5"/>

      <text x="13.5" y="15.5" text-anchor="middle" font-size="6" font-weight="900" fill="#fff">1</text>
      <text x="50.5" y="52.5" text-anchor="middle" font-size="6" font-weight="900" fill="#fff">5</text>
    </g>

    <!-- star -->
    <g transform="translate(130 108) scale(1.05)">
      <polygon
        points="0,-9.2 2.85,-3.45 9.2,-2.5 4.6,1.95 5.7,8.35 0,5.35 -5.7,8.35 -4.6,1.95 -9.2,-2.5 -2.85,-3.45"
        fill="url(#starGrad)"
        stroke="#000"
        stroke-width="0.45"/>
    </g>

    <!-- crown -->
    <g transform="translate(159 138) scale(0.9)">
      <rect x="-7" y="8" width="14" height="3" rx="1"
            fill="#E11D48" stroke="#1a1a1a" stroke-width="1"/>
      <path d="M-6,8 L-8,-3 L-3,2 L0,-6 L3,2 L8,-3 L6,8 Z"
            fill="#FB7185" stroke="#1a1a1a" stroke-width="1"/>
    </g>

    <!-- LOJË icon -->
    <g transform="translate(120 155) scale(0.5)">
      <rect x="7" y="22" width="12" height="12" rx="3" fill="#22C55E" stroke="#1a1a1a" stroke-width="1.5"/>
      <rect x="21" y="22" width="12" height="12" rx="3" fill="#22C55E" stroke="#1a1a1a" stroke-width="1.5"/>
      <rect x="35" y="22" width="12" height="12" rx="3" fill="#9CA3AF" stroke="#1a1a1a" stroke-width="1.5"/>
      <rect x="49" y="22" width="12" height="12" rx="3" fill="#EAB308" stroke="#1a1a1a" stroke-width="1.5"/>

      <text x="13" y="31" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">L</text>
      <text x="27" y="31" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">O</text>
      <text x="41" y="31" text-anchor="middle" font-size="8" font-weight="900" fill="#888">J</text>
      <text x="54" y="31" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">&#203;</text>
    </g>

    <!-- green animated puzzle with circles restored -->
    <g transform="translate(88 128) scale(0.48)">
      <rect x="19" y="5" width="12" height="12" rx="2" fill="#14B8A6" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;1;0.6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="fill" values="#14B8A6;#0D9488;#0D9488;#14B8A6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
      </rect>

      <rect x="33" y="5" width="12" height="12" rx="2" fill="#14B8A6" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;1;0.6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="0.6s" repeatCount="indefinite"/>
        <animate attributeName="fill" values="#14B8A6;#0D9488;#0D9488;#14B8A6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="0.6s" repeatCount="indefinite"/>
      </rect>

      <rect x="33" y="19" width="12" height="12" rx="2" fill="#14B8A6" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;1;0.6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="0.9s" repeatCount="indefinite"/>
        <animate attributeName="fill" values="#14B8A6;#0D9488;#0D9488;#14B8A6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="0.9s" repeatCount="indefinite"/>
      </rect>

      <rect x="33" y="33" width="12" height="12" rx="2" fill="#14B8A6" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;1;0.6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
        <animate attributeName="fill" values="#14B8A6;#0D9488;#0D9488;#14B8A6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
      </rect>

      <rect x="19" y="33" width="12" height="12" rx="2" fill="#14B8A6" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;1;0.6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
        <animate attributeName="fill" values="#14B8A6;#0D9488;#0D9488;#14B8A6" keyTimes="0;0.3;0.5;1" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
      </rect>

      <circle cx="11" cy="11" r="5" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
      <circle cx="25" cy="53" r="5" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    </g>

    <!-- moon moved a bit up -->
    <g transform="translate(90 166) scale(0.9)">
      <g transform="rotate(40 12 12)">
        <path
          d="M12,2.2 A9,9 0 0,1 10,21 A10.5,12.5 0 0,0 12,2.3"
          fill="#6366F1"
          stroke="#4338CA"
          stroke-width="1"
          stroke-linejoin="round"
          stroke-linecap="round"/>
      </g>
    </g>

    <!-- text -->
    <text x="130" y="215"
          text-anchor="middle"
          font-family="Arial"
          font-size="14"
          font-weight="700"
          fill="white">
      Lojra
    </text>

    <text x="130" y="233"
          text-anchor="middle"
          font-family="Arial"
          font-size="14"
          font-weight="700"
          fill="#C4B5FD">
      Logjike
    </text>

    <!-- home button -->
    <circle cx="130" cy="282" r="8"
            fill="none"
            stroke="#059669"
            stroke-width="2"/>

  </g>

</svg>