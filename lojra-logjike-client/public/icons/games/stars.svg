<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <filter id="starShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.1" flood-color="#F59E0B" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="10" fill="#FEF3C7" stroke="#1a1a1a" stroke-width="1.4"/>

  <!-- Cells -->
  <rect x="8" y="8" width="22" height="22" rx="6" fill="#FDE68A"/>
  <rect x="34" y="8" width="22" height="22" rx="6" fill="#FDE68A"/>
  <rect x="8" y="34" width="22" height="22" rx="6" fill="#FDE68A"/>
  <rect x="34" y="34" width="22" height="22" rx="6" fill="#FDE68A"/>

  <!-- Grid -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#D97706" stroke-width="0.9" opacity="0.4"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#D97706" stroke-width="0.9" opacity="0.4"/>

  <!-- STAR -->
  <g transform="translate(19 19)">
    <g filter="url(#starShadow)">
      <animateTransform
        attributeName="transform"
        type="scale"
        values="0;1.06;1;1.06;1"
        keyTimes="0;0.18;0.35;0.65;1"
        dur="2.2s"
        repeatCount="indefinite"/>

      <animateTransform
        attributeName="transform"
        additive="sum"
        type="rotate"
        values="-18;8;0;6;0"
        keyTimes="0;0.2;0.38;0.7;1"
        dur="2.2s"
        repeatCount="indefinite"/>

      <polygon
        points="0,-5.3 1.7,-1.7 5.5,-1.4 2.7,1.2 3.6,4.9 0,3.0 -3.6,4.9 -2.7,1.2 -5.5,-1.4 -1.7,-1.7"
        fill="url(#starGrad)"
        stroke="#000"
        stroke-width="0.4"
        stroke-linejoin="round"
        stroke-linecap="round"/>
    </g>
  </g>

  <!-- X top right -->
  <g stroke="#9CA3AF" stroke-width="1.7" stroke-linecap="round">
    <line x1="42" y1="16" x2="48" y2="22"/>
    <line x1="48" y1="16" x2="42" y2="22"/>
    <animate attributeName="opacity"
      values="0;0;1;1;0"
      keyTimes="0;0.22;0.22;0.82;1"
      dur="2.2s"
      repeatCount="indefinite"/>
  </g>

  <!-- X bottom left -->
  <g stroke="#9CA3AF" stroke-width="1.7" stroke-linecap="round">
    <line x1="16" y1="42" x2="22" y2="48"/>
    <line x1="22" y1="42" x2="16" y2="48"/>
    <animate attributeName="opacity"
      values="0;0;1;1;0"
      keyTimes="0;0.22;0.22;0.82;1"
      dur="2.2s"
      repeatCount="indefinite"/>
  </g>

  <!-- X bottom right -->
  <g stroke="#9CA3AF" stroke-width="1.7" stroke-linecap="round">
    <line x1="42" y1="42" x2="48" y2="48"/>
    <line x1="48" y1="42" x2="42" y2="48"/>
    <animate attributeName="opacity"
      values="0;0;1;1;0"
      keyTimes="0;0.22;0.22;0.82;1"
      dur="2.2s"
      repeatCount="indefinite"/>
  </g>
</svg>