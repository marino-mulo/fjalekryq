<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">


  <!-- Board -->
  <rect x="4" y="4" width="56" height="56" rx="5" fill="#FFE4E6" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Grid lines -->
  <line x1="18" y1="5" x2="18" y2="59" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="32" y1="5" x2="32" y2="59" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="46" y1="5" x2="46" y2="59" stroke="#ffffff" stroke-width="1.5"/>

  <line x1="5" y1="18" x2="59" y2="18" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="5" y1="32" x2="59" y2="32" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="5" y1="46" x2="59" y2="46" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Queen 1 -->
  <g transform="translate(6.5 7.6) scale(0.34)">
    <g>
      <!-- Jump -->
      <animateTransform attributeName="transform"
        type="translate"
        values="0 0;0 -1.8;0 0"
        dur="1.8s"
        repeatCount="indefinite"/>

      <!-- Tilt -->
      <animateTransform attributeName="transform"
        additive="sum"
        type="rotate"
        values="0 12 12;2 12 12;-2 12 12;0 12 12"
        dur="2.5s"
        repeatCount="indefinite"/>

      <rect x="5" y="19" width="14" height="3" rx="1.4" fill="#E11D48"/>
      <path d="M6,19 L4,8 L9,13 L12,5 L15,13 L20,8 L18,19 Z"
            fill="#FB7185" stroke="#E11D48" stroke-width="0.9" stroke-linejoin="round"/>
      <circle cx="4" cy="7" r="1.8" fill="#E11D48"/>
      <circle cx="12" cy="4" r="1.8" fill="#E11D48"/>
      <circle cx="20" cy="7" r="1.8" fill="#E11D48"/>
    </g>
  </g>

  <!-- Queen 2 -->
  <g transform="translate(34.8 21.7) scale(0.34)">
    <g>
      <animateTransform attributeName="transform"
        type="translate"
        values="0 0;0 -1.8;0 0"
        dur="1.8s"
        repeatCount="indefinite"/>

      <animateTransform attributeName="transform"
        additive="sum"
        type="rotate"
        values="0 12 12;2 12 12;-2 12 12;0 12 12"
        dur="2.5s"
        repeatCount="indefinite"/>

      <rect x="5" y="19" width="14" height="3" rx="1.4" fill="#E11D48"/>
      <path d="M6,19 L4,8 L9,13 L12,5 L15,13 L20,8 L18,19 Z"
            fill="#FB7185" stroke="#E11D48" stroke-width="0.9" stroke-linejoin="round"/>
      <circle cx="4" cy="7" r="1.8" fill="#E11D48"/>
      <circle cx="12" cy="4" r="1.8" fill="#E11D48"/>
      <circle cx="20" cy="7" r="1.8" fill="#E11D48"/>
    </g>
  </g>

  <!-- Queen 3 -->
  <g transform="translate(20.8 48.7) scale(0.34)">
    <g>
      <animateTransform attributeName="transform"
        type="translate"
        values="0 0;0 -1.8;0 0"
        dur="1.8s"
        repeatCount="indefinite"/>

      <animateTransform attributeName="transform"
        additive="sum"
        type="rotate"
        values="0 12 12;2 12 12;-2 12 12;0 12 12"
        dur="2.5s"
        repeatCount="indefinite"/>

      <rect x="5" y="19" width="14" height="3" rx="1.4" fill="#E11D48"/>
      <path d="M6,19 L4,8 L9,13 L12,5 L15,13 L20,8 L18,19 Z"
            fill="#FB7185" stroke="#E11D48" stroke-width="0.9" stroke-linejoin="round"/>
      <circle cx="4" cy="7" r="1.8" fill="#E11D48"/>
      <circle cx="12" cy="4" r="1.8" fill="#E11D48"/>
      <circle cx="20" cy="7" r="1.8" fill="#E11D48"/>
    </g>
  </g>

</svg>