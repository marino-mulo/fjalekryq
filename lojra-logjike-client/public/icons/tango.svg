<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="4" y="4" width="56" height="56" rx="6" fill="#FFF7ED" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="7" y="7" width="23" height="23" rx="4" fill="#FFEDD5" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="34" y="7" width="23" height="23" rx="4" fill="#FDBA74" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="7" y="34" width="23" height="23" rx="4" fill="#FDBA74" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="34" y="34" width="23" height="23" rx="4" fill="#FFEDD5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sun top-left -->
  <g>
    <circle cx="18" cy="18" r="5.5" fill="#FF8C00" stroke="#B45309" stroke-width="1"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </g>
  <!-- Moon top-right -->
  <g>
    <circle cx="46" cy="18" r="5.5" fill="#FF8C00" stroke="#B45309" stroke-width="1"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </g>
  <!-- Moon bottom-left -->
  <g>
   <path d="M22,41 A6,6 0 0,1 14,51 A8.5,10.5 0 0,0 22,41" fill="#6366F1" stroke="#4338CA" stroke-width="1"/>
   <animate attributeName="opacity" values="1;0.5;1" dur="3s" begin="1s" repeatCount="indefinite"/>
  </g>
  <!-- Sun bottom-right -->
  <g>
    <circle cx="46" cy="46" r="5.5" fill="#FF8C00" stroke="#B45309" stroke-width="1"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </g>
  <!-- Equals signs -->
  <line x1="30" y1="17" x2="34" y2="17" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="20" x2="34" y2="20" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>

  <line x1="16" y1="30" x2="19.5" y2="34" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.5" y1="30" x2="16" y2="34" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>

  <!-- X sign -->
  <line x1="30" y1="44.5" x2="34" y2="48.5" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="44.5" x2="30" y2="48.5" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round"/>
</svg>
