<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="1" x2="0.5" y2="1">
      <stop offset="20%" stop-color="#ffd484"/>
      <stop offset="100%" stop-color="#ff7c02"/>
    </linearGradient>
    <style>
      .icon {
        transform-origin: 12px 12px;
      }

      /* SHOW */
      .show {
        animation: showAnim 0.55s ease-out forwards;
      }

      /* HIDE */
      .hide {
        animation: hideAnim 0.25s ease-in forwards;
      }

      @keyframes showAnim {
        0% {
          opacity: 0;
          transform: scale(0.2) rotate(-68deg);
        }
        70% {
          opacity: 1;
          transform: scale(1.3) rotate(8deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      @keyframes hideAnim {
        0% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
        100% {
          opacity: 0;
          transform: scale(0.2) rotate(-68deg);
        }
      }
    </style>
  </defs>

  <g class="icon show">
    <polygon
      points="12,2.8 14.85,8.55 21.2,9.5 16.6,13.95 17.7,20.35 12,17.35 6.3,20.35 7.4,13.95 2.8,9.5 9.15,8.55"
      fill="url(#starGrad)"
      stroke="#000"
      stroke-width="0.45"
      stroke-linejoin="round"
      stroke-linecap="round"/>
  </g>
</svg>
