<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <g transform="translate(12 12)">
    <animateTransform
      attributeName="transform"
      type="scale"
      values="0;1.06;1"
      keyTimes="0;0.7;1"
      dur="0.55s"
      fill="freeze"
      additive="sum"/>

    <g>
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="-18;8;0"
        keyTimes="0;0.65;1"
        dur="0.55s"
        fill="freeze"/>

      <polygon
        points="0,-9.2 2.85,-3.45 9.2,-2.5 4.6,1.95 5.7,8.35 0,5.35 -5.7,8.35 -4.6,1.95 -9.2,-2.5 -2.85,-3.45"
        fill="url(#starGrad)"
        stroke="#000"
        stroke-width="0.45"
        stroke-linejoin="round"
        stroke-linecap="round"/>
    </g>
  </g>
</svg>
