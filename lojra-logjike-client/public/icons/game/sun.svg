<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      .icon {
        transform-origin: 12px 12px;
      }

      /* SHOW */
      .show {
        animation: showAnim 0.6s ease-out forwards;
      }

      /* HIDE */
      .hide {
        animation: hideAnim 0.6s ease-in forwards;
      }

      @keyframes showAnim {
        0% {
          opacity: 0;
          transform: scale(0.4);
        }
        60% {
          opacity: 1;
          transform: scale(1.12);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes hideAnim {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(0.4);
        }
      }
    </style>
  </defs>

  <g class="icon show">
    <circle cx="12" cy="12" r="7.5"
            fill="#FF8C00"
            stroke="#B45309"
            stroke-width="1"/>
  </g>
</svg>