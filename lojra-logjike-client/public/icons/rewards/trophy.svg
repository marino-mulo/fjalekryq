<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cupGrad" x1="18" y1="14" x2="46" y2="45">
      <stop offset="0" stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#E47F0B"/>
    </linearGradient>

    <linearGradient id="baseGrad" x1="25" y1="44" x2="39" y2="58">
      <stop offset="0" stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#E47F0B"/>
    </linearGradient>

    <clipPath id="clip">
      <path d="M20 18H44L40.5 39C40.2 40.8 38.7 42 36.9 42H27.1C25.3 42 23.8 40.8 23.5 39L20 18Z"/>
    </clipPath>

    <style>
      .float {
        animation: float 2.6s ease-in-out infinite;
        transform-origin: 32px 34px;
      }

      .pulse {
        animation: pulse 2s ease-in-out infinite;
        transform-origin: 32px 30px;
      }

      .shine {
        animation: shine 2.8s linear infinite;
      }

      @keyframes float {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-2px); }
      }

      @keyframes pulse {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }

      @keyframes shine {
        0%   { transform: translateX(-18px) rotate(18deg); opacity: 0; }
        30%  { opacity: 0.25; }
        50%  { opacity: 0; }
        100% { transform: translateX(24px) rotate(18deg); opacity: 0; }
      }
    </style>
  </defs>

  <g class="float">

    <g class="pulse">
      <!-- Handles -->
      <path d="M20 20H15.5C12.7 20 10.5 17.8 10.5 15C10.5 12.2 12.7 10 15.5 10C18.1 10 18.9 13 22 13"
        stroke="#FFCD44" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M44 20H48.5C51.3 20 53.5 17.8 53.5 15C53.5 12.2 51.3 10 48.5 10C45.9 10 45.1 13 42 13"
        stroke="#FFCD44" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Cup -->
      <path d="M20 18H44L40.5 39C40.2 40.8 38.7 42 36.9 42H27.1C25.3 42 23.8 40.8 23.5 39L20 18Z"
        fill="url(#cupGrad)"/>

      <!-- Shine -->
      <g clip-path="url(#clip)">
        <rect class="shine" x="18" y="12" width="6" height="36" rx="3" fill="white"/>
      </g>

      <!-- Highlight -->
      <path d="M25 21C23.7 23.5 23.1 27 24.4 31"
        stroke="white" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>

      <!-- Stem -->
      <rect x="29.5" y="42" width="5" height="8" rx="2.5" fill="url(#baseGrad)"/>

      <!-- Base -->
      <rect x="23" y="50" width="18" height="5.5" rx="2.75" fill="url(#baseGrad)"/>
      <rect x="27" y="55.5" width="10" height="3" rx="1.5" fill="#E47F0B"/>
    </g>

  </g>
</svg>