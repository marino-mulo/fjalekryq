<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="rocketBody" x1="24" y1="10" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>

    <linearGradient id="windowGrad" x1="27" y1="19" x2="37" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="finGrad" x1="16" y1="33" x2="24" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB7185"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>

    <linearGradient id="finGrad2" x1="40" y1="33" x2="48" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB7185"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>

    <linearGradient id="flameOuter" x1="28" y1="42" x2="36" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>

    <linearGradient id="flameInner" x1="30" y1="45" x2="34" y2="53" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>

    <filter id="shadow" x="6" y="2" width="52" height="60" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>

    <style>
      .rocketFloat {
        animation: rocketFloat 2.8s ease-in-out infinite;
        transform-origin: 32px 30px;
      }

      .flameOuterAnim {
        animation: flameFlickerOuter 0.45s ease-in-out infinite alternate;
        transform-origin: 32px 41px;
      }

      .flameInnerAnim {
        animation: flameFlickerInner 0.32s ease-in-out infinite alternate;
        transform-origin: 32px 42px;
      }

      .windowGlow {
        animation: windowPulse 2s ease-in-out infinite;
      }

      @keyframes rocketFloat {
        0%   { transform: translateY(0px) rotate(0deg); }
        25%  { transform: translateY(-2px) rotate(-1deg); }
        50%  { transform: translateY(-5px) rotate(0.8deg); }
        75%  { transform: translateY(-2px) rotate(-0.6deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }

      @keyframes flameFlickerOuter {
        0%   { transform: scaleY(1) scaleX(1); opacity: 0.95; }
        100% { transform: scaleY(1.22) scaleX(0.9); opacity: 1; }
      }

      @keyframes flameFlickerInner {
        0%   { transform: scaleY(1) scaleX(1); opacity: 0.9; }
        100% { transform: scaleY(1.3) scaleX(0.82); opacity: 1; }
      }

      @keyframes windowPulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.82; }
      }
    </style>
  </defs>

  <g class="rocketFloat" filter="url(#shadow)">
    <!-- Body -->
    <path
      d="M32 6
         C28 6 24 15 24 15
         L21 38
         C20.8 39.7 22.1 41 23.8 41
         H40.2
         C41.9 41 43.2 39.7 43 38
         L40 15
         C40 15 36 6 32 6Z"
      fill="url(#rocketBody)"
      stroke="#94A3B8"
      stroke-width="1.2"
      stroke-linejoin="round"
    />

    <!-- Body highlight -->
    <path
      d="M29 11C27.2 13.8 25.8 18.8 25.2 24.5"
      stroke="white"
      stroke-opacity="0.75"
      stroke-width="2"
      stroke-linecap="round"
    />

    <!-- Window -->
    <g class="windowGlow">
      <circle cx="32" cy="22" r="6.5" fill="url(#windowGrad)" stroke="#1D4ED8" stroke-width="1"/>
      <circle cx="30.2" cy="20.2" r="2" fill="#BFDBFE" opacity="0.85"/>
    </g>

    <!-- Left fin -->
    <path
      d="M21.5 34.5L15.5 40.5C14.8 41.2 15.3 42.4 16.3 42.4H21.8L24.5 31.5L21.5 34.5Z"
      fill="url(#finGrad)"
    />

    <!-- Right fin -->
    <path
      d="M42.5 34.5L48.5 40.5C49.2 41.2 48.7 42.4 47.7 42.4H42.2L39.5 31.5L42.5 34.5Z"
      fill="url(#finGrad2)"
    />

    <!-- Flame outer -->
    <path
      class="flameOuterAnim"
      d="M28 41.5
         C28 41.5 28.8 47.5 32 52
         C35.2 47.5 36 41.5 36 41.5
         L33.8 39.5
         H30.2
         L28 41.5Z"
      fill="url(#flameOuter)"
    />

    <!-- Flame inner -->
    <path
      class="flameInnerAnim"
      d="M30.2 43
         C30.2 43 30.8 46.5 32 48.6
         C33.2 46.5 33.8 43 33.8 43
         L32.9 42
         H31.1
         L30.2 43Z"
      fill="url(#flameInner)"
    />
  </g>
</svg>