name: fjalekryq_mobile
description: "Fjalekryq - Albanian crossword word puzzle game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependency_overrides:
  vector_math: ^2.3.0
  meta: ^1.18.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  provider: ^6.1.0
  sqflite: ^2.4.1
  path: ^1.9.0
  audioplayers: ^6.1.0
  google_fonts: ^6.0.0
  google_mobile_ads: ^5.3.0
  app_tracking_transparency: ^2.0.6
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  widgetbook: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#07152F"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/ui/
    - assets/audio/sfx/
    - assets/audio/music/
