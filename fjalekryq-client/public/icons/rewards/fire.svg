<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <style>
      .flameFloat {
        animation: flameFloat 2.4s ease-in-out infinite;
        transform-origin: 24px 26px;
      }

      .outerFlame {
        animation: outerFlicker 0.5s ease-in-out infinite alternate;
        transform-origin: 24px 30px;
      }

      .midFlame {
        animation: midFlicker 0.42s ease-in-out infinite alternate;
        transform-origin: 24px 29px;
      }

      .innerFlame {
        animation: innerFlicker 0.34s ease-in-out infinite alternate;
        transform-origin: 24px 28px;
      }

      .glowPulse {
        animation: glowPulse 1.8s ease-in-out infinite;
        transform-origin: 24px 40px;
      }

      @keyframes flameFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-1.2px); }
      }

      @keyframes outerFlicker {
        0%   { transform: scaleY(1) scaleX(1); }
        100% { transform: scaleY(1.08) scaleX(0.96); }
      }

      @keyframes midFlicker {
        0%   { transform: scaleY(1) scaleX(1); }
        100% { transform: scaleY(1.12) scaleX(0.94); }
      }

      @keyframes innerFlicker {
        0%   { transform: scaleY(1) scaleX(1); }
        100% { transform: scaleY(1.15) scaleX(0.92); }
      }

      @keyframes glowPulse {
        0%, 100% { transform: scaleX(1); opacity: 0.42; }
        50% { transform: scaleX(1.18); opacity: 0.7; }
      }
    </style>
  </defs>

  <ellipse class="glowPulse" cx="24" cy="40" rx="8" ry="3" fill="#FEF3C7" opacity="0.5"/>

  <g class="flameFloat">
    <path class="outerFlame" d="M24 4C24 4 14 16 14 28C14 33.5 18.5 38 24 38C29.5 38 34 33.5 34 28C34 16 24 4 24 4Z" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
    <path class="midFlame" d="M24 14C24 14 18 22 18 28C18 31.3 20.7 34 24 34C27.3 34 30 31.3 30 28C30 22 24 14 24 14Z" fill="#FBBF24"/>
    <path class="innerFlame" d="M24 22C24 22 21 26 21 29C21 30.7 22.3 32 24 32C25.7 32 27 30.7 27 29C27 26 24 22 24 22Z" fill="#FDE68A"/>
  </g>
</svg>