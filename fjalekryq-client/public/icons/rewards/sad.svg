<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <style>
      .sadBounce {
        animation: sadBounce 2.5s ease-in-out infinite;
        transform-origin: 24px 24px;
      }
      .tearDrop {
        animation: tearFall 2s ease-in infinite;
        transform-origin: center top;
      }
      @keyframes sadBounce {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(1px) rotate(-3deg); }
        75% { transform: translateY(1px) rotate(3deg); }
      }
      @keyframes tearFall {
        0% { opacity: 0; transform: translateY(0); }
        20% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(8px); }
      }
    </style>
  </defs>
  <g class="sadBounce">
    <circle cx="24" cy="24" r="18" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5"/>
    <!-- Eyes -->
    <ellipse cx="17" cy="20" rx="2.5" ry="3" fill="#92400E"/>
    <ellipse cx="31" cy="20" rx="2.5" ry="3" fill="#92400E"/>
    <!-- Eyebrows (sad, angled up in center) -->
    <line x1="13" y1="14" x2="19" y2="16" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="14" x2="29" y2="16" stroke="#92400E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Sad mouth -->
    <path d="M17 32 Q24 26 31 32" fill="none" stroke="#92400E" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Tear drops -->
    <ellipse class="tearDrop" cx="17" cy="25" rx="1.2" ry="1.8" fill="#60A5FA" opacity="0.7"/>
    <ellipse class="tearDrop" cx="31" cy="25" rx="1.2" ry="1.8" fill="#60A5FA" opacity="0.7" style="animation-delay: 1s"/>
  </g>
</svg>
