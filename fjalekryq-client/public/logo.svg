<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="2" y="2" width="59" height="59" rx="5" fill="#DCFCE7" stroke="#000" stroke-width="1.2"/>

  <!-- Row 1: empty grey tiles -->
  <rect x="5.5" y="5" width="10" height="10" rx="3" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="19.5" y="5" width="10" height="10" rx="3" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="33.5" y="5" width="10" height="10" rx="3" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="47.5" y="5" width="10" height="10" rx="3" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.2"/>

  <!-- Row 2: F J A L (green) -->
  <rect x="5.5" y="19" width="10" height="10" rx="3" fill="#22C55E" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="19.5" y="19" width="10" height="10" rx="3" fill="#22C55E" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="33.5" y="19" width="10" height="10" rx="3" fill="#22C55E" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="47.5" y="19" width="10" height="10" rx="3" fill="#22C55E" stroke="#D1D5DB" stroke-width="1"/>
  <text x="10.5" y="27" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">F</text>
  <text x="24.5" y="27" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">J</text>
  <text x="38.5" y="27" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">A</text>
  <text x="52.5" y="27" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">L</text>

  <!-- Row 3: empty, empty, Ë (animated), empty -->
  <rect x="5.5" y="34" width="10" height="10" rx="3" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="19.5" y="34" width="10" height="10" rx="3" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="33.5" y="34" width="10" height="10" rx="3" fill="#EAB308" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="47.5" y="34" width="10" height="10" rx="3" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="38.5" y="42" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">&#203;
    <animate attributeName="fill" values="#fff;#fff;#000;#000;#fff" keyTimes="0;0.3;0.5;0.8;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Row 4: K R Y Q (green) -->
  <rect x="5.5" y="48" width="10" height="10" rx="3" fill="#22C55E" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="19.5" y="48" width="10" height="10" rx="3" fill="#22C55E" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="33.5" y="48" width="10" height="10" rx="3" fill="#22C55E" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="47.5" y="48" width="10" height="10" rx="3" fill="#22C55E" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="10.5" y="56" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">K</text>
  <text x="24.5" y="56" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">R</text>
  <text x="38.5" y="56" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">Y</text>
  <text x="52.5" y="56" text-anchor="middle" font-size="8" font-weight="900" fill="#fff">Q</text>
</svg>
