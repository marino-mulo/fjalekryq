<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8">
  <title>Fjalekryq</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <app-root>
    <style>
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FFF8F0;
      }
      .app-loading-grid {
        display: grid;
        grid-template-columns: repeat(5, 48px);
        gap: 5px;
        filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.18));
      }
      .app-loading-tile {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Nunito', 'Arial Black', sans-serif;
        font-weight: 900;
        font-size: 20px;
        color: #fff;
        border: 2px solid rgba(0,0,0,0.18);
        box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
        animation: tileIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .app-loading-tile.y { background: #c9b458; }
      .app-loading-tile.d { background: #787c7e; }
      .app-loading-tile.w {
        /* word tile: entrance + solve to green */
        animation:
          tileIn    0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both,
          tileSolve 0.4s  cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes tileIn {
        0%   { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1);   opacity: 1; }
      }
      @keyframes tileSolve {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.18); }
        100% { background: #6aaa64; transform: scale(1); }
      }
      /* Entrance stagger: 40ms apart for 25 tiles */
      .app-loading-tile:nth-child(1)  { animation-delay:   0ms; }
      .app-loading-tile:nth-child(2)  { animation-delay:  40ms; }
      .app-loading-tile:nth-child(3)  { animation-delay:  80ms; }
      .app-loading-tile:nth-child(4)  { animation-delay: 120ms; }
      .app-loading-tile:nth-child(5)  { animation-delay: 160ms; }
      .app-loading-tile:nth-child(6)  { animation-delay: 200ms; }
      .app-loading-tile:nth-child(7)  { animation-delay: 240ms; }
      .app-loading-tile:nth-child(8)  { animation-delay: 280ms; }
      .app-loading-tile:nth-child(9)  { animation-delay: 320ms; }
      .app-loading-tile:nth-child(10) { animation-delay: 360ms; }
      .app-loading-tile:nth-child(11) { animation-delay: 400ms; }
      .app-loading-tile:nth-child(12) { animation-delay: 440ms; }
      .app-loading-tile:nth-child(13) { animation-delay: 480ms; }
      .app-loading-tile:nth-child(14) { animation-delay: 520ms; }
      .app-loading-tile:nth-child(15) { animation-delay: 560ms; }
      .app-loading-tile:nth-child(16) { animation-delay: 600ms; }
      .app-loading-tile:nth-child(17) { animation-delay: 640ms; }
      .app-loading-tile:nth-child(18) { animation-delay: 680ms; }
      .app-loading-tile:nth-child(19) { animation-delay: 720ms; }
      .app-loading-tile:nth-child(20) { animation-delay: 760ms; }
      .app-loading-tile:nth-child(21) { animation-delay: 800ms; }
      .app-loading-tile:nth-child(22) { animation-delay: 840ms; }
      .app-loading-tile:nth-child(23) { animation-delay: 880ms; }
      .app-loading-tile:nth-child(24) { animation-delay: 920ms; }
      .app-loading-tile:nth-child(25) { animation-delay: 960ms; }
      /* Word tiles: solve delays (entrance + solve offset, random-ish order) */
      /* Row 2: Fjalë = nth-child 6-10 */
      .app-loading-tile:nth-child(8)  { animation-delay: 280ms, 1200ms; } /* A */
      .app-loading-tile:nth-child(6)  { animation-delay: 200ms, 1520ms; } /* F */
      .app-loading-tile:nth-child(10) { animation-delay: 360ms, 1840ms; } /* Ë */
      .app-loading-tile:nth-child(7)  { animation-delay: 240ms, 2160ms; } /* J */
      .app-loading-tile:nth-child(9)  { animation-delay: 320ms, 2480ms; } /* L */
      /* Row 4: Kryq = nth-child 16-19 */
      .app-loading-tile:nth-child(17) { animation-delay: 640ms, 2800ms; } /* R */
      .app-loading-tile:nth-child(16) { animation-delay: 600ms, 3120ms; } /* K */
      .app-loading-tile:nth-child(19) { animation-delay: 720ms, 3440ms; } /* Q */
      .app-loading-tile:nth-child(18) { animation-delay: 680ms, 3760ms; } /* Y */
    </style>
    <div class="app-loading">
      <div class="app-loading-grid">
        <!-- Row 1: filler -->
        <div class="app-loading-tile d">S</div>
        <div class="app-loading-tile y">M</div>
        <div class="app-loading-tile d">B</div>
        <div class="app-loading-tile y">T</div>
        <div class="app-loading-tile d">N</div>
        <!-- Row 2: Fjalë (word tiles) -->
        <div class="app-loading-tile w y">F</div>
        <div class="app-loading-tile w d">J</div>
        <div class="app-loading-tile w y">A</div>
        <div class="app-loading-tile w d">L</div>
        <div class="app-loading-tile w y">Ë</div>
        <!-- Row 3: filler -->
        <div class="app-loading-tile y">D</div>
        <div class="app-loading-tile d">P</div>
        <div class="app-loading-tile y">H</div>
        <div class="app-loading-tile d">V</div>
        <div class="app-loading-tile y">C</div>
        <!-- Row 4: Kryq (word tiles) + 1 filler -->
        <div class="app-loading-tile w d">K</div>
        <div class="app-loading-tile w y">R</div>
        <div class="app-loading-tile w d">Y</div>
        <div class="app-loading-tile w y">Q</div>
        <div class="app-loading-tile d">X</div>
        <!-- Row 5: filler -->
        <div class="app-loading-tile y">Z</div>
        <div class="app-loading-tile d">I</div>
        <div class="app-loading-tile y">E</div>
        <div class="app-loading-tile d">O</div>
        <div class="app-loading-tile y">U</div>
      </div>
    </div>
  </app-root>
</body>
</html>
