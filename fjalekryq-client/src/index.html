<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8">
  <title>Fjalekryq</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <app-root>
    <style>
      .app-loading {
        position: fixed;
        inset: 0;
        background: #FFF8F0;
        overflow: hidden;
      }
      .app-loading-tile {
        position: absolute;
        width: 52px;
        height: 52px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Nunito', 'Arial Black', sans-serif;
        font-weight: 900;
        font-size: 22px;
        color: #fff;
        opacity: 0;
        border: 2px solid rgba(0,0,0,0.12);
        box-shadow: 3px 3px 0 rgba(0,0,0,0.08);
        animation: tileIn 0.5s ease forwards, tileFloat 2s ease-in-out infinite;
      }
      .app-loading-tile.g { background: #6aaa64; }
      .app-loading-tile.y { background: #c9b458; }
      .app-loading-tile.d { background: #787c7e; }
      @keyframes tileIn {
        0%   { opacity: 0; }
        100% { opacity: 0.45; }
      }
      @keyframes tileFloat {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-8px); }
      }
    </style>
    <div class="app-loading">
      <div class="app-loading-tile g" style="left:4%;top:4%">S</div>
      <div class="app-loading-tile y" style="left:20%;top:2%">M</div>
      <div class="app-loading-tile d" style="left:34%;top:6%">B</div>
      <div class="app-loading-tile g" style="left:51%;top:3%">T</div>
      <div class="app-loading-tile y" style="left:66%;top:7%">N</div>
      <div class="app-loading-tile d" style="left:82%;top:2%">D</div>
      <div class="app-loading-tile g" style="left:2%;top:33%;animation-delay:0.3s,0.3s">F</div>
      <div class="app-loading-tile y" style="left:19%;top:37%;animation-delay:0.3s,0.3s">P</div>
      <div class="app-loading-tile d" style="left:35%;top:31%;animation-delay:0.3s,0.3s">H</div>
      <div class="app-loading-tile g" style="left:52%;top:36%;animation-delay:0.3s,0.3s">V</div>
      <div class="app-loading-tile y" style="left:67%;top:30%;animation-delay:0.3s,0.3s">C</div>
      <div class="app-loading-tile d" style="left:83%;top:38%;animation-delay:0.3s,0.3s">Z</div>
      <div class="app-loading-tile g" style="left:5%;top:64%;animation-delay:0.6s,0.6s">R</div>
      <div class="app-loading-tile y" style="left:21%;top:61%;animation-delay:0.6s,0.6s">K</div>
      <div class="app-loading-tile d" style="left:33%;top:68%;animation-delay:0.6s,0.6s">A</div>
      <div class="app-loading-tile g" style="left:50%;top:62%;animation-delay:0.6s,0.6s">L</div>
      <div class="app-loading-tile y" style="left:65%;top:69%;animation-delay:0.6s,0.6s">E</div>
      <div class="app-loading-tile d" style="left:81%;top:63%;animation-delay:0.6s,0.6s">Q</div>
    </div>
  </app-root>
</body>
</html>
