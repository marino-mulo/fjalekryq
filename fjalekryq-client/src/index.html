<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8">
  <title>Fjalekryq</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <app-root>
    <style>
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FFF8F0;
      }
      .app-loading-grid {
        display: grid;
        grid-template-columns: repeat(3, 48px);
        gap: 5px;
        filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.18));
      }
      .app-loading-tile {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Nunito', 'Arial Black', sans-serif;
        font-weight: 900;
        font-size: 20px;
        color: #fff;
        border: 2px solid rgba(0,0,0,0.18);
        box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
        /* Two animations: entrance pop, then solve to green */
        animation:
          tileIn   0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both,
          tileSolve 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      /* Start colours (scrambled feel: mix of yellow/grey) */
      .app-loading-tile.y { background: #c9b458; }
      .app-loading-tile.d { background: #787c7e; }
      @keyframes tileIn {
        0%   { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1);   opacity: 1; }
      }
      @keyframes tileSolve {
        0%   { background: inherit; transform: scale(1); }
        40%  { transform: scale(1.18); }
        100% { background: #6aaa64; transform: scale(1); }
      }
      /* Entrance stagger (45ms apart) */
      .app-loading-tile:nth-child(1) { animation-delay:   0ms, 900ms; }
      .app-loading-tile:nth-child(2) { animation-delay:  45ms, 1300ms; }
      .app-loading-tile:nth-child(3) { animation-delay:  90ms, 1700ms; }
      .app-loading-tile:nth-child(4) { animation-delay: 135ms, 1100ms; }
      .app-loading-tile:nth-child(5) { animation-delay: 180ms, 2100ms; }
      .app-loading-tile:nth-child(6) { animation-delay: 225ms, 1500ms; }
      .app-loading-tile:nth-child(7) { animation-delay: 270ms, 1900ms; }
      .app-loading-tile:nth-child(8) { animation-delay: 315ms, 2300ms; }
      .app-loading-tile:nth-child(9) { animation-delay: 360ms, 2500ms; }
    </style>
    <div class="app-loading">
      <div class="app-loading-grid">
        <div class="app-loading-tile y">K</div>
        <div class="app-loading-tile d">R</div>
        <div class="app-loading-tile y">A</div>
        <div class="app-loading-tile d">Q</div>
        <div class="app-loading-tile y">L</div>
        <div class="app-loading-tile d">J</div>
        <div class="app-loading-tile y">Ë</div>
        <div class="app-loading-tile d">F</div>
        <div class="app-loading-tile y">Y</div>
      </div>
    </div>
  </app-root>
</body>
</html>
