<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8">
  <title>Fjalekryq</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <app-root>
    <style>
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FFF8F0;
      }
      .app-loading-grid {
        display: grid;
        grid-template-columns: repeat(4, 48px);
        gap: 5px;
        filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.18));
      }
      .app-loading-tile {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Nunito', 'Arial Black', sans-serif;
        font-weight: 900;
        font-size: 20px;
        color: #fff;
        border: 2px solid rgba(0,0,0,0.18);
        box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
        animation: tileIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .app-loading-tile.g { background: #6aaa64; }
      .app-loading-tile.y { background: #c9b458; }
      .app-loading-tile.d { background: #787c7e; }
      .app-loading-tile:nth-child(1)  { animation-delay:   0ms; }
      .app-loading-tile:nth-child(2)  { animation-delay:  45ms; }
      .app-loading-tile:nth-child(3)  { animation-delay:  90ms; }
      .app-loading-tile:nth-child(4)  { animation-delay: 135ms; }
      .app-loading-tile:nth-child(5)  { animation-delay: 180ms; }
      .app-loading-tile:nth-child(6)  { animation-delay: 225ms; }
      .app-loading-tile:nth-child(7)  { animation-delay: 270ms; }
      .app-loading-tile:nth-child(8)  { animation-delay: 315ms; }
      .app-loading-tile:nth-child(9)  { animation-delay: 360ms; }
      .app-loading-tile:nth-child(10) { animation-delay: 405ms; }
      .app-loading-tile:nth-child(11) { animation-delay: 450ms; }
      .app-loading-tile:nth-child(12) { animation-delay: 495ms; }
      .app-loading-tile:nth-child(13) { animation-delay: 540ms; }
      .app-loading-tile:nth-child(14) { animation-delay: 585ms; }
      .app-loading-tile:nth-child(15) { animation-delay: 630ms; }
      .app-loading-tile:nth-child(16) { animation-delay: 675ms; }
      @keyframes tileIn {
        0%   { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1);   opacity: 1; }
      }
    </style>
    <div class="app-loading">
      <div class="app-loading-grid">
        <div class="app-loading-tile g">F</div>
        <div class="app-loading-tile y">J</div>
        <div class="app-loading-tile d">A</div>
        <div class="app-loading-tile g">L</div>
        <div class="app-loading-tile y">E</div>
        <div class="app-loading-tile d">K</div>
        <div class="app-loading-tile g">R</div>
        <div class="app-loading-tile y">Y</div>
        <div class="app-loading-tile d">Q</div>
        <div class="app-loading-tile g">B</div>
        <div class="app-loading-tile y">S</div>
        <div class="app-loading-tile d">T</div>
        <div class="app-loading-tile g">D</div>
        <div class="app-loading-tile y">M</div>
        <div class="app-loading-tile d">N</div>
        <div class="app-loading-tile g">P</div>
      </div>
    </div>
  </app-root>
</body>
</html>
