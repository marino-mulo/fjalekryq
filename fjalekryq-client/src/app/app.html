<!-- ── Landscape lock overlay ── -->
<div class="landscape-block" aria-hidden="true">
  <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1" y="5" width="14" height="14" rx="2"/>
    <path d="M19 9l3 3-3 3"/>
  </svg>
  <p class="landscape-msg">Rrotullo pajisjen</p>
</div>

<!-- ── Angular-managed splash (shown before home renders) ── -->
@if (showSplash()) {
  <div class="splash" [class.fading]="splashFading()">
    @for (t of splashTiles; track t.id) {
      <div class="sp sp--{{ t.color }}"
           [style.left]="t.left"
           [style.top]="t.top"
           [style.animation-delay]="t.delay">{{ t.letter }}</div>
    }
    <div class="splash-logo-wrap">
      <img src="logo.png" alt="Fjalëkryq" class="splash-logo">
    </div>
  </div>
}

<main class="page-content">
  <router-outlet />
</main>
