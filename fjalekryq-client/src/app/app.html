@if (showSplash()) {
  <div class="splash" [class.fading]="splashFading()">
    @for (t of splashTiles; track t.id) {
      <div class="sp sp--{{ t.color }}"
           [style.left]="t.left"
           [style.top]="t.top"
           [style.animation-delay]="t.delay">{{ t.letter }}</div>
    }
  </div>
}

<main class="page-content">
  <router-outlet />
</main>
