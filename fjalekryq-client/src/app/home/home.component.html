@if (!showGame()) {
  <div class="mobile-menu">

    <!-- Background animated tiles -->
    <div class="bg-tiles" aria-hidden="true">
      @for (tile of bgTiles(); track tile.id) {
        <div class="bg-tile bg-tile--{{ tile.color }}"
             [style.left.%]="tile.x"
             [style.top.%]="tile.y"
             [style.animation-delay.s]="tile.delay">
          {{ tile.letter }}
        </div>
      }
    </div>

    <div class="menu-top">
      <img src="logo.png" class="logo-img" alt="Fjalëkryq">
      <p class="menu-sub">Loja shqipe e fjalëve</p>
    </div>

    <div class="menu-actions">
      <button class="btn-play" (click)="startGame()">
        <span class="btn-play-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </span>
        <span class="btn-level">LEVEL {{ level() }}</span>
      </button>
      <button class="btn-tutorial" (click)="startTutorial()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
        </svg>
        Tutorial
      </button>
    </div>

    <div class="menu-footer">
      <a href="https://instagram.com/fjalekryq.al" target="_blank" rel="noopener" class="social-pill">
        <img src="icons/ui/instagram.svg" width="18" height="18" alt="Instagram">
        Instagram
      </a>
      <a href="https://tiktok.com/@fjalekryq" target="_blank" rel="noopener" class="social-pill">
        <img src="icons/ui/tiktok.svg" width="18" height="18" alt="TikTok">
        TikTok
      </a>
    </div>

  </div>
} @else {
  <section class="game-section">
    <app-wordle7 (goBack)="backToMenu()" />
  </section>
}
