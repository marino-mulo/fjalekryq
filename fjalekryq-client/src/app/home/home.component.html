@if (!showGame()) {
  <div class="mobile-menu">

    <div class="menu-top">
      <img src="logo.svg" class="menu-logo" alt="Fjalekryq">
      <h1 class="menu-title">Fjale<span class="purple">kryq</span></h1>
      <p class="menu-sub">Loja shqipe e fjalëve</p>
    </div>

    <div class="menu-actions">
      <button class="btn-play" (click)="startGame()">
        <span class="btn-play-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </span>
        LUAJ
      </button>

      <button class="btn-secondary" (click)="startGame()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Sfida e Sotme
      </button>
    </div>

    <div class="menu-footer">
      <a href="https://instagram.com/fjalekryq.al" target="_blank" rel="noopener" class="social-pill">
        <img src="icons/ui/instagram.svg" width="18" height="18" alt="Instagram">
        Instagram
      </a>
      <a href="https://tiktok.com/@fjalekryq" target="_blank" rel="noopener" class="social-pill">
        <img src="icons/ui/tiktok.svg" width="18" height="18" alt="TikTok">
        TikTok
      </a>
    </div>

  </div>
} @else {
  <section class="game-section">
    <app-wordle7 />
  </section>
}
