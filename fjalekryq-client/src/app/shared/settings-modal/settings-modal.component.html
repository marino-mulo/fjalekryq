@if (isOpen()) {
  <div class="settings-overlay" (click)="close()">
    <div class="settings-modal" (click)="$event.stopPropagation()">

      <!-- Header -->
      <div class="settings-header">
        <div class="settings-header-left">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <h2 class="settings-title">Cilësimet</h2>
        </div>
        <button class="settings-close-btn" (click)="close()" aria-label="Mbyll">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="settings-divider"></div>

      <!-- Profile section -->
      <div class="settings-section">
        <div class="section-label">Profili</div>
        <div class="profile-row">
          <div class="avatar-circle">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="profile-info">
            <span class="profile-name">Luajtës</span>
            <span class="profile-sub">Llogaria lokale</span>
          </div>
        </div>
      </div>

      <div class="settings-divider"></div>

      <!-- Sound section -->
      <div class="settings-section">
        <div class="section-label">Zëri</div>
        <div class="toggle-row">
          <div class="toggle-left">
            <div class="toggle-icon-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            </div>
            <span class="toggle-label">Efektet e zërit</span>
          </div>
          <button
            class="toggle-switch"
            [class.on]="soundEnabled()"
            (click)="toggleSound()"
            [attr.aria-checked]="soundEnabled()"
            role="switch"
            aria-label="Efektet e zërit"
          >
            <span class="toggle-thumb"></span>
          </button>
        </div>
      </div>

      <div class="settings-divider"></div>

      <!-- Notifications section -->
      <div class="settings-section">
        <div class="section-label">Njoftimet</div>
        <div class="toggle-row">
          <div class="toggle-left">
            <div class="toggle-icon-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </div>
            <span class="toggle-label">Njoftimet</span>
          </div>
          <button
            class="toggle-switch"
            [class.on]="notificationsEnabled()"
            (click)="toggleNotifications()"
            [attr.aria-checked]="notificationsEnabled()"
            role="switch"
            aria-label="Njoftimet"
          >
            <span class="toggle-thumb"></span>
          </button>
        </div>
      </div>

      <div class="settings-divider"></div>

      <!-- Email notifications section -->
      <div class="settings-section">
        <div class="section-label">Njoftimet me Email</div>
        <div class="toggle-row">
          <div class="toggle-left">
            <div class="toggle-icon-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <span class="toggle-label">Kujtesë ditore me email</span>
          </div>
          <button
            class="toggle-switch"
            [class.on]="emailNotificationsEnabled()"
            (click)="toggleEmailNotifications()"
            [attr.aria-checked]="emailNotificationsEnabled()"
            role="switch"
            aria-label="Njoftimet me Email"
          >
            <span class="toggle-thumb"></span>
          </button>
        </div>
      </div>

      <div class="settings-divider"></div>

      <!-- Close button -->
      <button class="settings-close-bottom" (click)="close()">Mbyll</button>

    </div>
  </div>
}
